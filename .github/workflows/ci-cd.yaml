name: DevSecOps Comprehensive Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security & IaC Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Semgrep SAST (Static Analysis)
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
        continue-on-error: true

      # 2. Checkov IaC Scan (Kubernetes manifests)
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true # Bypass: Καταγράφει αλλά δεν "κόβει" το build

      # 3. Trivy Config Scan (Misconfigurations)
      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          directory: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
        continue-on-error: true

      # Ανέβασμα όλων των αποτελεσμάτων στο Security Tab του GitHub
      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

  build-and-deploy:
    name: Build & Image Security
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker Buildx για προηγμένο caching (στρατηγική Platform Engineer)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build το image τοπικά (χωρίς push ακόμα) για να το σκανάρουμε
      - name: Build and Load Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/base
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Trivy Image Scan (Vulnerabilities check)
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Bypass: Δεν αποτυγχάνει το step

      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Τώρα που σκανάραμε, κάνουμε το Push στο DockerHub
      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}

      # GitOps Update (για το ArgoCD)
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}|g" apps/base/nginx.yaml
          
      - name: Commit and Push to Repo
        run: |
          git config --global user.email "devsecops-bot@example.com"
          git config --global user.name "DevSecOps Bot"
          git add apps/base/nginx.yaml
          git commit -m "chore: update image to ${{ github.sha }} [skip ci]"
          git push