name: DevSecOps Comprehensive Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security & IaC Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Semgrep SAST
      - name: Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      # 2. Checkov IaC Scan
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      # 3. Trivy Config Scan
      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          directory: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
        continue-on-error: true

      # 4. Ανέβασμα αποτελεσμάτων
      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

  build-and-deploy:
    name: Build & Image Security
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ΔΙΟΡΘΩΣΗ: Προσθήκη του σωστού path για το Dockerfile
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }} ./apps/base

      # 5. Trivy Image Scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ΔΙΟΡΘΩΣΗ: Αφαίρεση του path από το push
      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}

      # GitOps Update (για το ArgoCD)
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}|g" apps/base/nginx.yaml
          
      # ΔΙΟΡΘΩΣΗ: Σωστό path στο git add
      - name: Commit and Push
        run: |
          git config --global user.email "devsecops-bot@example.com"
          git config --global user.name "DevSecOps Bot"
          git add apps/base/nginx.yaml
          git commit -m "chore: update image to ${{ github.sha }} [skip ci]"
          git push