name: DevSecOps Master Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STAGE 1: Στατική Ανάλυση (Κώδικας, IaC, Kubernetes)
  static-security:
    name: Static Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Semgrep: Έλεγχος πηγαίου κώδικα
      - name: Semgrep SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep \
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      # 2. Checkov: Έλεγχος ασφαλείας στα Kubernetes YAML
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      # 3. Kube-linter: Έλεγχος βέλτιστων πρακτικών Kubernetes
      - name: Kube-linter Scan
        uses: stackrox/kube-linter-action@v1
        run: |
          docker run --rm -v "${{ github.workspace }}:/dir" stackrox/kube-linter lint /dir --format sarif > kube-linter.sarif
        continue-on-error: true

      # 4. Upload αποτελεσμάτων στο Security Tab
      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload Kube-linter Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

  # STAGE 2: Build και Image Scanning
  build-and-deploy:
    name: Build, Scan and Push
    needs: static-security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build το Image τοπικά για σκανάρισμα
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }} .

      # 2. Trivy: Έλεγχος του Image για CVEs (Ευπάθειες)
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      # 3. Push στο Docker Hub (Μόνο αν το Trivy δεν βρήκε Critical/High αν θες να το κόψεις)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}

      # 4. GitOps: Ενημέρωση του YAML για το ArgoCD
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: nxcreed/my-nginx-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-nginx-app:${{ github.sha }}|g" nginx.yaml
          
      - name: Commit and Push to Git
        run: |
          git config --global user.email "devsecops-bot@example.com"
          git config --global user.name "DevSecOps Bot"
          git add nginx.yaml
          git commit -m "chore: update image to ${{ github.sha }} [skip ci]"
          git push