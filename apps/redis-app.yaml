apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-redis-db
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.19.4        # pin to a real chart version
    helm:
      values: |
        image:
          registry: docker.io
          repository: bitnami/redis
          tag: latest  # full Bitnami tag format
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true