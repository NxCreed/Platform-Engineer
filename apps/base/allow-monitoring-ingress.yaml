apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-to-nginx
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: nginx # Στόχος είναι τα pods του Nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring # Επιτρέπει κίνηση ΜΟΝΟ από το monitoring namespace
    ports:
    - protocol: TCP
      port: 8080 # Η πόρτα όπου ο nginx εκθέτει τα metrics