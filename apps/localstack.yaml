helm:
      values: |
        image:
          tag: latest
        extraEnvVars:
          - name: SERVICES
            value: "s3,sqs,lambda,sns,dynamodb" # Αφαιρέθηκε το RDS (Pro)
          - name: DEBUG
            value: "1"
          - name: LAMBDA_EXECUTOR
            value: "local" # Τρέχει τις Lambdas μέσα στο process, χωρίς Docker socket
          - name: LOCALSTACK_HOST
            value: "localhost"
        
        # Απενεργοποιούμε το mount του Docker socket για να μην πετάει το FileNotFoundError
        mountDind:
          enabled: false

        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

        persistence:
          enabled: true
          size: 5Gi