apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack-aws
  namespace: argocd
spec:
  project: default
  source:
    chart: localstack
    repoURL: https://localstack.github.io/helm-charts
    targetRevision: 0.6.14
    helm:
      values: |
        image:
          repository: localstack/localstack
          tag: latest
          pullPolicy: Always
        
        extraEnvVars:
          - name: LOCALSTACK_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: localstack-secrets
                key: auth-token
          - name: SERVICES
            value: "s3,sqs,lambda,sns,dynamodb,ec2,iam"
          - name: DEBUG
            value: "1"
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
        
        # ΑΥΤΟ ΕΙΝΑΙ ΤΟ ΚΛΕΙΔΙ ΓΙΑ ΤΗΝ EC2 ΣΤΑ WINDOWS
        mountDind:
          enabled: false # Απενεργοποιούμε το εσωτερικό Docker...
        
        # ...και κάνουμε mount το Docker των Windows
        volumes:
          - name: docker-sock
            hostPath:
              path: /var/run/docker.sock
        volumeMounts:
          - name: docker-sock
            mountPath: /var/run/docker.sock

        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi" # Το EC2 θέλει μνήμη!

  destination:
    server: https://kubernetes.default.svc
    namespace: localstack

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true