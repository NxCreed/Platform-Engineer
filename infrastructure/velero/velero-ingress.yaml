apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velero-ui-ingress
  namespace: velero
  annotations:
    kubernetes.io/ingress.class: nginx
    # ΑΦΑΙΡΕΣΕ ΤΗ ΓΡΑΜΜΗ nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: velero.local
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific # Άλλαξέ το από Prefix σε ImplementationSpecific
        backend:
          service:
            name: velero-ui
            port:
              number: 80