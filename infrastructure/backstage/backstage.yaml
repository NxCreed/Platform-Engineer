apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    chart: backstage
    repoURL: https://backstage.github.io/charts
    targetRevision: 1.0.0  # Επιβεβαίωσε την έκδοση από το helm search
    helm:
      # Διόρθωση για το πρόβλημα με το SSL πιστοποιητικό του schema validator
      skipSchemaValidation: true
      values: |
        backstage:
          appConfig:
            app:
              baseUrl: http://backstage.local
            backend:
              baseUrl: http://backstage.local
              database:
                client: pg
            integrations:
              github:
                - host: github.com
                  token: ${GITHUB_TOKEN}
          
          # Περνάμε το GitHub Token από το Secret που έφτιαξες
          extraEnvVars:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secrets
                  key: token

        # Ρυθμίσεις για την εσωτερική PostgreSQL
        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/postgresql
            # Διόρθωση για το ImagePullBackOff - χρησιμοποιούμε tag που υπάρχει σίγουρα
            tag: lastest
          auth:
            postgresqlPassword: "backstage-password"
          primary:
            persistence:
              enabled: true
              size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true